<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elastic AI — super admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#141418;--ink2:#67676e;--ink3:#9c9ca2;--bg:#f7f7f4;--line:#e9e9e2;--card:#fff;--ind:#5b54e6}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  .wrap{max-width:760px;margin:0 auto;padding:26px 18px 60px}
  h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0 0 4px}
  .sub{color:var(--ink2);font-size:14px;margin:0 0 22px}
  .stat{display:inline-block;font-size:12px;color:var(--ink3);margin-right:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .meta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink3);margin-bottom:6px;flex-wrap:wrap}
  .pill{font-size:10px;font-weight:700;letter-spacing:.4px;padding:2px 7px;border-radius:5px;text-transform:uppercase}
  .pill.owner{background:#eef0ff;color:#3d36c4}.pill.looper{background:#e7f6ee;color:#0e7a50}
  .txt{font-size:14px;line-height:1.55;white-space:pre-wrap}
  .msg{color:var(--ink2);font-size:14px;padding:30px;text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Beta feedback</h1>
    <p class="sub">Everything owners and loopers send from the apps. <span id="stats"></span></p>
    <div id="list"><div class="msg">Loading…</div></div>
  </div>
<script>
(function(){
  var U="https://somgalhkmptkclgvxhca.supabase.co/functions/v1/app-feedback";
  var token=new URLSearchParams(location.search).get("token")||"";
  var list=document.getElementById("list");
  if(!token){list.innerHTML='<div class="msg">Add your token to the URL: <code>?token=YOUR_TOKEN</code></div>';return;}
  function esc(s){return String(s==null?"":s).replace(/[&<>]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;"})[c];});}
  fetch(U+"?token="+encodeURIComponent(token)).then(function(r){if(r.status===403)throw new Error("403");return r.json();}).then(function(d){
    var items=d.items||[];
    document.getElementById("stats").textContent=items.length+" total";
    if(!items.length){list.innerHTML='<div class="msg">No feedback yet.</div>';return;}
    list.innerHTML=items.map(function(f){
      var when=(f.created_at||"").replace("T"," ").slice(0,16);
      return '<div class="card"><div class="meta"><span class="pill '+(f.role==="looper"?"looper":"owner")+'">'+esc(f.role||"owner")+'</span><span>'+esc(f.company_name||"—")+'</span><span>·</span><span>'+esc(f.page||"")+'</span><span>·</span><span>'+esc(when)+'</span></div><div class="txt">'+esc(f.text)+'</div></div>';
    }).join("");
  }).catch(function(e){list.innerHTML='<div class="msg">'+(String(e).indexOf("403")>=0?"That token isn\'t right.":"Couldn\'t load.")+'</div>';});
})();
</script>
</body>
</html>
