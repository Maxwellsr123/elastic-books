<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elastic â€” The Desk</title>
<script>window.IS_DEV=/(^|\/)dev(\/|$)/.test(location.pathname)||new URLSearchParams(location.search).get("env")==="dev";if(window.IS_DEV)document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("envbadge");if(b){b.textContent="DEV";b.style.background="#bbf7d0";b.style.color="#166534";}document.title="DEV Â· "+document.title;});</script>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.30.0/tabler-icons.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F7F4;--card:#fff;--line:#D9D9CC;--ink:#141418;--ink2:#67676E;--ink3:#9C9CA2;
--ind:#5B54E6;--ind2:#7B74EE;--indbg:#EEEDFB;--indtx:#3D36C4;
--grn:#0E7A50;--grnbg:#E7F6EE;--amb:#9A5B12;--ambbg:#FBF1E2;--blu:#175CD3;--blubg:#EFF6FF;--red:#B42318;--redbg:#FEF3F2}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
.top{display:flex;align-items:center;justify-content:space-between;padding:15px 26px;border-bottom:1px solid var(--line);background:#131218;color:#fff;position:sticky;top:0;z-index:10}
.top .brand{display:flex;align-items:center;gap:11px;font-weight:600;font-size:15px}
.top .logo{width:30px;height:30px;border-radius:4px;background:linear-gradient(135deg,var(--ind),var(--ind2));display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px}
.top .sub{font-size:11px;font-weight:700;letter-spacing:1.4px;color:#7B74EE;text-transform:uppercase}
.wrap{max-width:880px;margin:0 auto;padding:24px 20px 80px}
.sec{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin:24px 0 10px;display:flex;align-items:center;gap:8px}
.sec .cnt{text-transform:none;letter-spacing:0;font-weight:500;font-size:12px;color:var(--ink3)}
.co{background:#fff;border:1px solid var(--line);border-radius:6px;margin-bottom:10px;overflow:hidden}
.cohead{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.cohead:hover{background:#FCFCF9}
.coname{font-weight:600;font-size:14.5px;flex:1;min-width:0;display:flex;align-items:center;gap:9px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:2px;white-space:nowrap}
.b-grn{background:var(--grnbg);color:var(--grn)}.b-amb{background:var(--ambbg);color:var(--amb)}.b-ind{background:var(--indbg);color:var(--indtx)}.b-red{background:var(--redbg);color:var(--red)}.b-mut{background:#EFEFE8;color:var(--ink3)}
.panel{border-top:1px solid var(--line);padding:16px;display:none;background:#FBFBF8}
.drop{border:2px dashed #C9C4F2;border-radius:6px;background:#fff;padding:16px;text-align:center;margin-bottom:16px}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:9px 15px;border-radius:3px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--ind);color:#fff;border-color:var(--ind)}
.btn-g{border-color:var(--grn);color:var(--grn)}
.list{background:#fff;border:1px solid var(--line);border-radius:4px}
.row{display:flex;align-items:center;gap:11px;padding:11px 13px;border-top:1px solid #ECECE4;flex-wrap:wrap}
.row:first-child{border-top:0}
.rmain{flex:1;min-width:180px}
.rt{font-weight:600;font-size:13.5px}
.rs{font-size:12px;color:var(--ink2);margin-top:1px}
.muted{color:var(--ink3);font-size:12.5px}
a{color:var(--indtx)}
#gate{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
@media(max-width:640px){.wrap{padding:16px 10px 60px}.cohead{padding:12px 12px;flex-wrap:wrap}.row{padding:10px 11px}}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><div class="logo">E</div><div><div>The Desk <span id="envbadge" style="font-size:10px;font-weight:700;letter-spacing:.5px;background:#fde68a;color:#92400e;padding:2px 7px;border-radius:3px;vertical-align:middle">BETA</span></div><div class="sub">Elastic Â· every client, one screen</div></div></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="whoami" style="font-size:12px;color:#8B8B98"></span>
    <a id="signout" style="font-size:12px;color:#A7A2F4;cursor:pointer;font-weight:600">Sign out</a>
  </div>
</div>

<div class="wrap">
  <div class="sec">Needs Elastic <span class="cnt" id="workhint">loading clientsâ€¦</span></div>
  <div id="worklist"></div>
  <div class="sec" style="margin-top:28px">Quiet <span class="cnt">nothing owed right now</span></div>
  <div id="quietlist"></div>
</div>

<div id="gate">
  <div style="width:100%;max-width:380px;text-align:center">
    <div style="width:52px;height:52px;border-radius:6px;background:linear-gradient(135deg,var(--ind),var(--ind2));margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:22px">E</div>
    <div style="font-size:19px;font-weight:600;margin-bottom:5px">Elastic team sign-in</div>
    <div style="font-size:13px;color:var(--ink2);margin-bottom:18px">Enter your @elasticadmin email and we'll send a link.</div>
    <input id="gemail" type="email" placeholder="you@elasticadmin.com" style="width:100%;border:1px solid var(--line);border-radius:3px;padding:12px;font-family:inherit;font-size:14px;margin-bottom:10px">
    <button id="gbtn" class="btn btn-p" style="width:100%;justify-content:center;padding:12px">Email me a link</button>
    <div id="gmsg" style="font-size:12.5px;margin-top:10px;min-height:16px;color:var(--ink2)"></div>
  </div>
</div>

<script>
var API="https://somgalhkmptkclgvxhca.supabase.co/functions/v1";
var APP="app.html";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function money(n){return "$"+Math.abs(Number(n)||0).toLocaleString("en-NZ",{minimumFractionDigits:2,maximumFractionDigits:2});}
var SKEY="ava_session";
function getS(){try{return JSON.parse(localStorage.getItem(SKEY)||"null");}catch(e){return null;}}
var SESSION=getS();
var CACHE={};

// â”€â”€ auth: loopers only; dev is open â”€â”€
function boot(){
  var t=new URLSearchParams(location.search).get("t");
  if(t){fetch(API+"/auth",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"verify",token:t})})
    .then(function(r){return r.json();}).then(function(d){if(d&&d.ok){localStorage.setItem(SKEY,JSON.stringify({email:d.email,name:d.name,looper:d.looper,companies:d.companies}));}history.replaceState({},"",location.pathname);SESSION=getS();boot();})
    .catch(function(){history.replaceState({},"",location.pathname);boot();});return;}
  if(window.IS_DEV&&!SESSION){SESSION={email:"max@elasticadmin.com",name:"Dev looper",looper:true};start();return;}
  if(!SESSION){document.getElementById("gate").style.display="flex";return;}
  if(!SESSION.looper){location.replace(APP);return;}
  start();
}
document.getElementById("gbtn").addEventListener("click",function(){
  var v=(document.getElementById("gemail").value||"").trim().toLowerCase(),m=document.getElementById("gmsg");
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){m.textContent="Enter a valid email.";return;}
  this.disabled=true;this.textContent="Sendingâ€¦";var b=this;
  fetch(API+"/auth",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"request",email:v,redirect:location.origin+location.pathname.replace(/admin\.html$/,"app.html")})})
    .then(function(r){return r.json();}).then(function(d){b.disabled=false;b.textContent="Email me a link";m.textContent=d&&d.error?d.error:"Check your email â€” link sent.";})
    .catch(function(){b.disabled=false;b.textContent="Email me a link";m.textContent="Couldn't send â€” try again.";});
});
document.getElementById("signout").addEventListener("click",function(){localStorage.removeItem(SKEY);location.reload();});

// â”€â”€ the desk â”€â”€
function start(){
  document.getElementById("whoami").textContent=(SESSION.name||SESSION.email||"").split("@")[0];
  fetch(API+"/admin-clients").then(function(r){return r.json();}).then(function(d){
    var cs=(d.clients||[]).filter(function(c){return !/^(test|sandbox)/i.test(c.name||"");});
    if(!window.IS_DEV)cs=cs.filter(function(c){return c.id!=="8449f5d6-a12f-4238-88e3-4ae6e3e1dac5";});
    Promise.all(cs.map(function(c){return fetch(API+"/chase-list?company="+c.id).then(function(r){return r.json();}).then(function(cl){CACHE[c.id]=cl;return {c:c,cl:cl};}).catch(function(){return {c:c,cl:null};});}))
      .then(renderClients);
  }).catch(function(){document.getElementById("workhint").textContent="couldn't load clients";});
}
function laneCounts(cl){
  var it=(cl&&cl.items)||[];
  var n=function(f){return it.filter(f).length;};
  return {
    ready:n(function(i){return i.lane==="ready";}),
    review:n(function(i){return i.lane==="review"||i.lane==="looper";}),
    owner:n(function(i){return i.lane==="guess"||(i.needs_receipt&&!i.receipt_incoming&&!i.reconciled&&!i.bill&&i.lane!=="review"&&i.lane!=="looper");}),
    hunting:n(function(i){return i.receipt_incoming;}),
    pile:n(function(i){return i.lane==="pile";})
  };
}
function renderClients(rows){
  rows.sort(function(a,b){var ca=laneCounts(a.cl),cb=laneCounts(b.cl);return (cb.ready+cb.review)-(ca.ready+ca.review)||(cb.owner-ca.owner);});
  var work="",quiet="",working=0;
  rows.forEach(function(r){
    var c=laneCounts(r.cl),name=r.c.name;
    var conn='<span class="dot" title="Gmail" style="background:'+(r.c.gmail?"#0E7A50":"#D9D9CC")+'"></span><span class="dot" title="Xero" style="background:'+(r.c.xero?"#13B5EA":"#D9D9CC")+'"></span>';
    var badges="";
    if(c.ready)badges+='<span class="badge b-grn">'+c.ready+' to reconcile</span> ';
    if(c.review)badges+='<span class="badge b-amb">'+c.review+' check</span> ';
    if(c.owner)badges+='<span class="badge b-ind">'+c.owner+' with owner</span> ';
    if(c.pile)badges+='<span class="badge b-mut">'+c.pile+' in pile</span> ';
    if(!badges)badges='<span class="badge b-mut">all quiet</span>';
    var html='<div class="co" data-id="'+r.c.id+'"><div class="cohead"><div class="coname">'+conn+' '+esc(name)+'</div>'+badges+'<i class="ti ti-chevron-down" style="color:var(--ink3)"></i></div><div class="panel" id="p-'+r.c.id+'"></div></div>';
    if(c.ready||c.review||c.owner||c.pile){work+=html;working++;}else quiet+=html;
  });
  document.getElementById("worklist").innerHTML=work||'<div class="muted" style="padding:8px 2px">Nothing owed anywhere â€” nice.</div>';
  document.getElementById("quietlist").innerHTML=quiet;
  document.getElementById("workhint").textContent=working+" client"+(working===1?"":"s")+" with work";
}
document.addEventListener("click",function(e){
  var h=e.target.closest(".cohead");
  if(h){var co=h.parentNode,id=co.getAttribute("data-id"),p=document.getElementById("p-"+id);
    var open=p.style.display==="block";
    document.querySelectorAll(".panel").forEach(function(x){x.style.display="none";});
    if(!open){p.style.display="block";renderPanel(id);}
    return;}
  var b=e.target.closest(".bdrop");
  if(b){var f=document.querySelector('.bfile[data-id="'+b.getAttribute("data-id")+'"]');if(f)f.click();return;}
  var r=e.target.closest(".brec");
  if(r){var rid=r.getAttribute("data-id"),rco=r.getAttribute("data-co");r.disabled=true;r.textContent="â€¦";
    fetch(API+"/chase-feedback",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({company_id:rco,id:rid,action:"reconciled"})})
      .then(function(x){return x.json();}).then(function(m){if(m&&m.error){alert(m.error);r.disabled=false;r.textContent="Reconciled";}else refresh(rco);}).catch(function(){r.disabled=false;});
    return;}
  var sm=e.target.closest(".showmore");
  if(sm){var om=document.getElementById("om-"+sm.getAttribute("data-id"));if(om){om.style.display="block";sm.parentNode.style.display="none";}return;}
  var bb=e.target.closest(".bback");
  if(bb){var bid=bb.getAttribute("data-id"),bco=bb.getAttribute("data-co");bb.disabled=true;
    fetch(API+"/chase-feedback",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({company_id:bco,id:bid,action:"reopen"})})
      .then(function(){refresh(bco);}).catch(function(){bb.disabled=false;});
    return;}
});
function itemRow(i,actions){
  var rc=i.receipt_url?'<a href="'+i.receipt_url+'" target="_blank" style="font-size:12px;text-decoration:none;white-space:nowrap">View â†—</a>'
    :(i.receipt==="have"?'<span class="muted" style="white-space:nowrap"><i class="ti ti-paperclip" style="vertical-align:-2px"></i> on the Xero txn âś“</span>':'');
  var extra=(i.extra_receipts||[]).map(function(x){return '<a href="'+x.url+'" target="_blank" style="font-size:12px;text-decoration:none;white-space:nowrap">'+esc(x.filename)+'</a>';}).join(" ");
  return '<div class="row"><div class="rmain"><div class="rt">'+esc(i.supplier)+' â€” '+money(i.amount)+'</div><div class="rs">'+(i.date||"")+(i.account?" Â· "+esc(i.account):"")+(i.job_ref?' Â· <b>'+esc(i.job_ref)+'</b>':"")+(i.note?' Â· '+esc(String(i.note).slice(0,80)):"")+'</div></div>'+rc+extra+actions+'</div>';
}
function renderPanel(id){
  var p=document.getElementById("p-"+id),cl=CACHE[id];
  if(!cl){p.innerHTML='<div class="muted">Couldn\'t load this client.</div>';return;}
  var it=cl.items||[];
  var ready=it.filter(function(i){return i.lane==="ready";});
  var review=it.filter(function(i){return i.lane==="review"||i.lane==="looper";});
  var owner=it.filter(function(i){return i.lane==="guess"||(i.needs_receipt&&!i.receipt_incoming&&!i.reconciled&&!i.bill&&i.lane!=="review"&&i.lane!=="looper");});
  var hunting=it.filter(function(i){return i.receipt_incoming;}).length;
  var pile=it.filter(function(i){return i.lane==="pile";}).length;

  var html='<div class="drop"><div style="font-weight:600;font-size:14px;margin-bottom:3px"><i class="ti ti-file-spreadsheet" style="color:var(--indtx);vertical-align:-2px"></i> Drop the reconciliation report</div>'
    +'<div class="muted" style="margin-bottom:11px">Xero unreconciled export â€” screenshot, PDF, CSV or Excel. Ava reads every line, matches receipts, and asks the owner the rest.</div>'
    +'<button class="btn btn-p bdrop" data-id="'+id+'"><i class="ti ti-upload"></i> Upload report</button>'
    +'<input type="file" class="bfile" data-id="'+id+'" accept="image/*,.pdf,.csv,.xlsx,.xls" multiple style="display:none">'
    +'<div class="bproc muted" style="margin-top:9px;min-height:15px"></div></div>';

  if(ready.length){html+='<div class="sec" style="margin-top:4px;color:var(--grn)">Ready to reconcile <span class="cnt">do these in Xero, tick off here</span></div><div class="list">'
    +ready.map(function(i){return itemRow(i,'<a href="https://go.xero.com/Bank/BankAccounts.aspx" target="_blank" style="font-size:12px;text-decoration:none">Xero â†—</a><button class="btn btn-g brec" data-id="'+i.id+'" data-co="'+id+'" style="padding:6px 11px;font-size:12px"><i class="ti ti-checks"></i> Reconciled</button>');}).join("")+'</div>';}
  if(review.length){html+='<div class="sec" style="color:var(--amb)">Check these <span class="cnt">Ava\'s flagged something off â€” your call</span></div><div class="list">'
    +review.map(function(i){return itemRow(i,'<button class="btn brec" data-id="'+i.id+'" data-co="'+id+'" style="padding:6px 11px;font-size:12px">Looks right â€” reconciled</button><button class="btn bback" data-id="'+i.id+'" data-co="'+id+'" style="padding:6px 11px;font-size:12px">Send back</button>');}).join("")+'</div>';}
  if(owner.length){
    var oRow=function(i){var j={};for(var k in i)j[k]=i[k];if(/low confidence|no candidate|no confident/i.test(String(j.note||"")))j.note="";return itemRow(j,'');};
    html+='<div class="sec" style="color:var(--indtx)">With the owner <span class="cnt">Ava\'s asking them â€” board + daily email. Nothing for you.</span></div><div class="list">'
      +owner.slice(0,8).map(oRow).join("")
      +(owner.length>8?'<div class="ownermore" id="om-'+id+'" style="display:none">'+owner.slice(8).map(oRow).join("")+'</div><div class="row"><a class="showmore" data-id="'+id+'" style="cursor:pointer;font-size:12.5px;font-weight:600">Show all '+owner.length+' â†’</a></div>':"")+'</div>';}
  if(hunting||pile){html+='<div class="muted" style="margin-top:12px"><i class="ti ti-sparkles" style="vertical-align:-2px"></i> Ava\'s on it: '+(hunting?hunting+' receipt'+(hunting===1?"":"s")+' arriving by email':'')+(hunting&&pile?' Â· ':'')+(pile?pile+' receipt'+(pile===1?"":"s")+' in the pile waiting for bank lines':'')+'</div>';}
  var ints=cl.integrations||{},ib=ints.inboxes||[];
  html+='<div class="muted" style="margin-top:12px"><i class="ti ti-mail" style="vertical-align:-2px"></i> Mailboxes Ava reads: '+(ib.length?ib.map(esc).join(", "):"<b>none yet</b>")
    +(ints.gmail_url?' &nbsp;Â·&nbsp; <a href="'+ints.gmail_url+'" target="_blank" style="font-weight:600;text-decoration:none">ďĽ‹ Link a mailbox</a>':'')+'</div>';
  html+='<div style="margin-top:14px"><a href="'+APP+'?c='+id+'" style="font-size:12.5px;font-weight:600;text-decoration:none">Open the owner\'s board â†’</a></div>';
  p.innerHTML=html;
}
document.addEventListener("change",function(e){
  var f=e.target.closest(".bfile");if(!f||!f.files.length)return;
  var co=f.getAttribute("data-id"),proc=f.closest(".drop").querySelector(".bproc");
  var files=Array.prototype.slice.call(f.files);f.value="";
  var done=0;
  (function next(idx){
    if(idx>=files.length){proc.textContent="Ava is hunting Gmail for receiptsâ€¦";
      fetch(API+"/chase-hunt",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({company_id:co})})
        .then(function(){proc.textContent="Done â€” "+done+" file"+(done===1?"":"s")+" read.";refresh(co);})
        .catch(function(){refresh(co);});
      return;}
    var file=files[idx];proc.textContent="Ava is reading "+file.name+" ("+(idx+1)+"/"+files.length+")â€¦";
    var rd=new FileReader();
    rd.onload=function(){var b64=String(rd.result).split(",")[1];
      fetch(API+"/chase-drop",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({company_id:co,kind:"bankline",file_base64:b64,mime:file.type||"application/octet-stream",filename:file.name})})
        .then(function(){done++;next(idx+1);}).catch(function(){next(idx+1);});};
    rd.readAsDataURL(file);
  })(0);
});
function refresh(co){
  fetch(API+"/chase-list?company="+co).then(function(r){return r.json();}).then(function(cl){CACHE[co]=cl;renderPanel(co);});
}
boot();
</script>
</body>
</html>
